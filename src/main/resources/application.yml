validateCardYear: 5

# ===== Datasource =====
spring:
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
     url: ${SPRING_DATASOURCE_URL}
     username: ${SPRING_DATASOURCE_USERNAME}
     password: ${SPRING_DATASOURCE_PASSWORD}

# ===== Security =====
jwt:
  secret: ${JWT_SECRET}

# ===== Swagger =====
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha